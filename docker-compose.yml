services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: family_cash_flow
      POSTGRES_USER: family_cash_flow
      POSTGRES_PASSWORD: family_cash_flow_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_cash_flow -d family_cash_flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      APP_NAME: Family Cash Flow
      API_V1_PREFIX: /api/v1
      POSTGRES_HOST: postgres
      DATABASE_URL: postgresql+psycopg://family_cash_flow:family_cash_flow_dev@postgres:5432/family_cash_flow
      JWT_SECRET_KEY: change-me-in-local-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
